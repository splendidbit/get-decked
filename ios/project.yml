name: GetDecked
options:
  bundleIdPrefix: com.splendidbit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  GetDecked:
    type: application
    platform: iOS
    sources:
      - path: GetDecked
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseFunctions
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
    settings:
      base:
        INFOPLIST_FILE: GetDecked/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.splendidbit.getdecked
        CODE_SIGN_ENTITLEMENTS: GetDecked/GetDecked.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: GetDecked/GetDecked.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
  GetDeckedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GetDeckedTests
    dependencies:
      - target: GetDecked
  GetDeckedStickers:
    type: app-extension.messages-sticker-pack
    platform: iOS
    sources:
      - path: GetDeckedStickers
    settings:
      base:
        INFOPLIST_FILE: GetDeckedStickers/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.splendidbit.getdecked.stickers
